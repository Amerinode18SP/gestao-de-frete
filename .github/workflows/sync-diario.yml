name: Sync Diario CTes

on:
  schedule:
    - cron: '0 3 * * *'  # 00:00 BRT (03:00 UTC)
  workflow_dispatch:       # Permite rodar manualmente pelo GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Sync CTes em lotes
        run: |
          echo "Iniciando sync - $(date)"
          PAGINA=1
          TOTAL_IMPORTADOS=0
          TOTAL_ATUALIZADOS=0
          MAX_ERROS=5
          ERROS_CONSECUTIVOS=0

          while true; do
            echo "Processando pagina $PAGINA..."
            RESPONSE=$(curl -s -X GET \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              --max-time 90 \
              "https://gestao-de-log.vercel.app/api/cron?pagina=$PAGINA&modo=sync")

            echo "Resposta: $RESPONSE"

            # Verifica se curl falhou completamente (sem resposta)
            if [ -z "$RESPONSE" ]; then
              ERROS_CONSECUTIVOS=$((ERROS_CONSECUTIVOS + 1))
              echo "Sem resposta do servidor ($ERROS_CONSECUTIVOS/$MAX_ERROS)"
              if [ $ERROS_CONSECUTIVOS -ge $MAX_ERROS ]; then
                echo "Muitos erros consecutivos, encerrando"
                break
              fi
              sleep 10
              continue
            fi

            ERROS_CONSECUTIVOS=0

            PROXIMA=$(echo $RESPONSE | grep -o '"proxima_pagina":[0-9]*' | grep -o '[0-9]*$')
            IMPORTADOS=$(echo $RESPONSE | grep -o '"importados":[0-9]*' | grep -o '[0-9]*$')
            ATUALIZADOS=$(echo $RESPONSE | grep -o '"atualizados":[0-9]*' | grep -o '[0-9]*$')
            CONCLUIDO=$(echo $RESPONSE | grep -o '"concluido":true')

            TOTAL_IMPORTADOS=$((TOTAL_IMPORTADOS + ${IMPORTADOS:-0}))
            TOTAL_ATUALIZADOS=$((TOTAL_ATUALIZADOS + ${ATUALIZADOS:-0}))

            echo "Importados ate agora: $TOTAL_IMPORTADOS, Atualizados: $TOTAL_ATUALIZADOS"

            # Concluído sem mais páginas
            if [ -n "$CONCLUIDO" ] || [ -z "$PROXIMA" ] || [ "$PROXIMA" = "null" ]; then
              echo "Sync concluido! Total: $TOTAL_IMPORTADOS importados, $TOTAL_ATUALIZADOS atualizados"
              break
            fi

            PAGINA=$PROXIMA
            sleep 3
          done

          echo "Resolvendo transportadoras..."
          for i in 1 2 3 4 5; do
            RESPONSE=$(curl -s -X GET \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              --max-time 90 \
              "https://gestao-de-log.vercel.app/api/cron?modo=resolver")
            echo "Resolver resposta: $RESPONSE"
            TEM_MAIS=$(echo $RESPONSE | grep -o '"tem_mais":true')
            if [ -z "$TEM_MAIS" ]; then
              echo "Transportadoras resolvidas!"
              break
            fi
            sleep 3
          done

          echo "Cron concluido - $(date)"
