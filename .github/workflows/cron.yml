name: Sync CTes Diario

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Sync CTes lote 1
        run: |
          curl -s -X GET "https://gestao-de-log.vercel.app/api/cron?pagina=1&modo=sync" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

      - name: Sync CTes lote 2
        run: |
          curl -s -X GET "https://gestao-de-log.vercel.app/api/cron?pagina=21&modo=sync" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

      - name: Preencher Transportadoras
        run: |
          curl -s -X GET "https://gestao-de-log.vercel.app/api/cron?modo=resolver" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
